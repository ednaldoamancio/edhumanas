<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; color: #333; }
        
        .painel-mestre { max-width: 900px; margin: 0 auto 20px auto; background-color: #2c3e50; color: white; padding: 20px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .painel-mestre h1 { margin: 0 0 5px 0; font-size: 20px; }
        .painel-mestre p { margin: 0; font-size: 13px; color: #bdc3c7; }

        .seletores { display: flex; gap: 15px; margin-top: 15px; }
        select { flex: 1; padding: 10px; font-size: 14px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold; cursor: pointer; outline: none; }

        .container { max-width: 900px; margin: 0 auto 40px auto; background-color: #fff; padding: 30px 40px; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); display: none; }
        .container.ativo { display: block; }

        .barra-ferramentas { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ecf0f1; padding-bottom: 15px; margin-bottom: 20px; }
        .status-salvamento { font-size: 12px; color: #27ae60; font-weight: bold; display: none; }
        .botoes { display: flex; gap: 8px; }
        
        button { background-color: #34495e; color: white; border: none; padding: 8px 15px; font-size: 13px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #2c3e50; }
        .btn-pdf { background-color: #c0392b; } .btn-pdf:hover { background-color: #a53125; }
        .btn-word { background-color: #2980b9; } .btn-word:hover { background-color: #2471a3; }
        .btn-editar { background-color: #f39c12; color: #fff; } .btn-editar:hover { background-color: #d68910; }

        .em-edicao .editavel { outline: 2px dashed #f39c12; background-color: #fdfbf7; padding: 5px; border-radius: 3px; }
        
        .pei-doc { color: #000; font-size: 13px; line-height: 1.5; }
        .cabecalho-doc { text-align: center; margin-bottom: 20px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 13px; }
        th, td { border: 1px solid #bdc3c7; padding: 8px; vertical-align: top; }
        th { background-color: #f8f9f9; text-align: left; }
        
        .topico { font-weight: bold; margin-top: 20px; margin-bottom: 5px; background-color: #ecf0f1; padding: 6px; border-left: 4px solid #34495e; }
        .caixa-texto { border: 1px solid #bdc3c7; min-height: 50px; padding: 10px; margin-bottom: 15px; background-color: #fff; }
        
        .assinaturas { margin-top: 50px; display: flex; justify-content: space-between; text-align: center; font-size: 12px; }
        .assinaturas div { width: 22%; border-top: 1px solid #000; padding-top: 5px; }

        ul { margin: 0; padding-left: 20px; }
        li { margin-bottom: 4px; }

        @media (max-width: 768px) {
            .seletores { flex-direction: column; }
            .barra-ferramentas { flex-direction: column; gap: 10px; align-items: flex-start; }
            .assinaturas { flex-wrap: wrap; gap: 20px; }
            .assinaturas div { width: 45%; }
        }
    </style>
</head>

        let alunoAtualId = null;

        function carregarAlunos() {
            const serie = document.getElementById('seletorSerie').value;
            const seletorAluno = document.getElementById('seletorAluno');
            const container = document.getElementById('container-pei');
            
            seletorAluno.innerHTML = '<option value="">2. Selecione o Aluno...</option>';
            container.classList.remove('ativo');
            
            if (!serie) {
                seletorAluno.disabled = true;
                return;
            }

            seletorAluno.disabled = false;
            for (let id in baseDeDados) {
                if (baseDeDados[id].serie === serie) {
                    seletorAluno.innerHTML += `<option value="${id}">${baseDeDados[id].nome} (Turma ${baseDeDados[id].turma})</option>`;
                }
            }
        }

        function gerarPEI() {
            alunoAtualId = document.getElementById('seletorAluno').value;
            const container = document.getElementById('container-pei');
            
            if (!alunoAtualId) {
                container.classList.remove('ativo');
                return;
            }

            // CARREGA DADOS: Tenta pegar do LocalStorage primeiro. Se não existir, pega do baseDeDados.
            const dadosSalvos = localStorage.getItem('pei_' + alunoAtualId);
            const dados = dadosSalvos ? JSON.parse(dadosSalvos) : baseDeDados[alunoAtualId];
            
            const html = `

                    <div>
                        <button class="btn-editar" id="btn-edit" onclick="toggleEdicao()">Habilitar Edição</button>
                        <span id="aviso-salvo" class="status-salvamento">✓ Alterações salvas automaticamente!</span>
                    </div>
                    <div class="botoes">
                        <button class="btn-pdf" onclick="baixarPDF('${dados.nome}')">Baixar PDF</button>
                        <button class="btn-word" onclick="baixarWord('${dados.nome}')">Baixar Word</button>
                    </div>
                </div>
                
                <div id="doc-pei" class="pei-doc">
                    <table style="width:100%; border:none; margin-bottom:20px;">
                        <tr>
                            <td style="width:15%; border:none; text-align:left; vertical-align:middle;">
                                <img src="logo_sp.png" alt="Logo SP" style="max-height: 70px;">
                            </td>
                            <td style="width:70%; border:none; text-align:center; vertical-align:middle; line-height:1.2;">
                                <div style="font-weight:bold; font-size:14px;">SECRETARIA DE ESTADO DA EDUCAÇÃO</div>
                                <div style="font-weight:bold; font-size:14px; margin:4px 0;">E.E. RECANTO VERDE SOL – URE LESTE 3</div>
                                <div style="font-weight:bold; font-size:15px; margin-top:8px;">ANEXO IV – PLANO EDUCACIONAL INDIVIDUALIZADO – PEI</div>

        // --- SISTEMA DE EDIÇÃO E SALVAMENTO AUTOMÁTICO ---
        let modoEdicao = false;

        function toggleEdicao() {
            const elemento = document.getElementById('doc-pei');
            const editaveis = elemento.querySelectorAll('.editavel');
            const btn = document.getElementById('btn-edit');

            modoEdicao = !modoEdicao;

            if (modoEdicao) {
                editaveis.forEach(el => el.setAttribute('contenteditable', 'true'));
                elemento.classList.add('em-edicao');
                btn.innerText = "Desabilitar Edição";
                btn.style.backgroundColor = "#c53030"; 
            } else {
                editaveis.forEach(el => el.setAttribute('contenteditable', 'false'));
                elemento.classList.remove('em-edicao');
                btn.innerText = "Habilitar Edição";
                btn.style.backgroundColor = "#f39c12";
            }
        }

        function adicionarEventosDeSalvamento() {
            const editaveis = document.querySelectorAll('.editavel');
            editaveis.forEach(el => {
                el.addEventListener('input', salvarModificacoesNoLocal);
            });
        }

        function salvarModificacoesNoLocal() {
            if (!alunoAtualId) return;
            
            // Coleta os dados atuais na tela
            let dadosAtualizados = {
                nome: document.getElementById('campo_nome').innerHTML,
                serie: document.getElementById('campo_serie').innerHTML.replace('º Ano', '').trim(),
                turma: document.getElementById('campo_turma').innerHTML,
                deficiencia: document.getElementById('campo_deficiencia').innerHTML,
                habilidades: document.getElementById('campo_habilidades').innerHTML,
                conteudos: document.getElementById('campo_conteudos').innerHTML,
                estrategias: document.getElementById('campo_estrategias').innerHTML,
                avaliacao: document.getElementById('campo_avaliacao').innerHTML,
                recursos: document.getElementById('campo_recursos').innerHTML
            };

            // Salva no navegador do usuário
            localStorage.setItem('pei_' + alunoAtualId, JSON.stringify(dadosAtualizados));

            // Mostra aviso de salvo
            const aviso = document.getElementById('aviso-salvo');
            aviso.style.display = 'inline-block';
            setTimeout(() => { aviso.style.display = 'none'; }, 2000);
        }

        // --- EXPORTAÇÃO ---
        function prepararParaExportacao() {
            if (modoEdicao) toggleEdicao(); 
        }

        function baixarPDF(nome) {
            prepararParaExportacao();
            const opt = { margin: 10, filename: `PEI_PV_${nome.replace(/ /g, '_')}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            html2pdf().set(opt).from(document.getElementById('doc-pei')).save();
        }

        function baixarWord(nome) {
            prepararParaExportacao();
            var header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>PEI</title><style>body{font-family:Arial; font-size:12px;} table{width:100%; border-collapse:collapse; margin-bottom:15px;} th, td{border:1px solid black; padding:5px; text-align:left;} .topico{font-weight:bold; background-color:#ecf0f1; padding:5px; margin-top:15px;} .caixa-texto{border:1px solid black; padding:10px; margin-bottom:15px;} .assinaturas{width:100%; display:table; margin-top:40px;} .ass-box{display:table-cell; width:25%; text-align:center; padding:10px; border-top:1px solid black;}</style></head><body>";
            var footer = "</body></html>";
            
            var htmlContext = document.getElementById('doc-pei').innerHTML;
            
            // Limpeza de tags
            htmlContext = htmlContext.replace(/contenteditable="true"/g, "").replace(/contenteditable="false"/g, "");
            
            // Corrige assinaturas para o Word
            htmlContext = htmlContext.replace(/<div class="assinaturas">/g, "<table style='border:none; margin-top:40px; text-align:center;'><tr style='border:none;'>");
            htmlContext = htmlContext.replace(/<div><br>Diretor de Escola<\/div>/g, "<td style='border:none; border-top:1px solid black;'>Diretor de Escola</td>");
            htmlContext = htmlContext.replace(/<div><br>Coordenador \(CGP\)<\/div>/g, "<td style='border:none; border-top:1px solid black;'>Coordenador (CGP)</td>");
            htmlContext = htmlContext.replace(/<div><br>Professor Especializado<\/div>/g, "<td style='border:none; border-top:1px solid black;'>Professor Especializado</td>");
            htmlContext = htmlContext.replace(/<div><br>Prof\. Ednaldo A\. Lima<\/div><\/div>/g, "<td style='border:none; border-top:1px solid black;'>Prof. Ednaldo A. Lima</td></tr></table>");

            var sourceHTML = header + htmlContext + footer;
            var source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(sourceHTML);
            var fileDownload = document.createElement("a");
            document.body.appendChild(fileDownload);
            fileDownload.href = source;
            fileDownload.download = `PEI_PV_${nome.replace(/ /g, '_')}.doc`;
            fileDownload.click();
            document.body.removeChild(fileDownload);
        }
    </script>
</body>
